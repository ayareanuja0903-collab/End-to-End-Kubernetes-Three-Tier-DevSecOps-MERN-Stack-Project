prometheus:

  prometheusSpec:

    retention: 15d

    scrapeInterval: 30s

    evaluationInterval: 30s

    storageSpec:

      volumeClaimTemplate:

        spec:

          storageClassName: gp3

          accessModes:

            - ReadWriteOnce

          resources:

            requests:

              storage: 20Gi

grafana:

  enabled: false

alertmanager:

  enabled: true