replicaCount: 2


image:
  repository: 023465168943.dkr.ecr.ap-south-1.amazonaws.com/three-tier-dev-backend
  tag: latest
  pullPolicy: Always


service:
  type: ClusterIP
  port: 5000


containerPort: 5000


env:

  NODE_ENV: production

  PORT: "5000"

  MONGO_CONN_STR: mongodb://mongodb-service:27017/three-tier-app

  USE_DB_AUTH: "true"


resources:

  requests:
    cpu: 200m
    memory: 256Mi

  limits:
    cpu: 500m
    memory: 512Mi


hpa:

  enabled: true

  minReplicas: 2

  maxReplicas: 6

  cpuUtilization: 70
