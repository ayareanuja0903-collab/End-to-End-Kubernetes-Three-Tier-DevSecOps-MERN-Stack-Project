apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: backend-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ayareanuja0903-collab/End-to-End-Kubernetes-Three-Tier-DevSecOps-MERN-Stack-Project.git
    targetRevision: main
    path: helm/backend-chart

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true