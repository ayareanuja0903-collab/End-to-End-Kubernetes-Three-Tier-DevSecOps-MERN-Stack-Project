apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: three-tier-app

spec:

  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:

    metadata:
      labels:
        app: frontend

    spec:

      serviceAccountName: three-tier-sa

      containers:

      - name: frontend

        image: 023465168943.dkr.ecr.ap-south-1.amazonaws.com/three-tier-dev-frontend:latest

        imagePullPolicy: Always

        ports:

        - containerPort: 80


        env:

        - name: REACT_APP_API_URL

          valueFrom:

            configMapKeyRef:

              name: app-config

              key: BACKEND_URL


        resources:

          requests:

            cpu: "100m"

            memory: "128Mi"


          limits:

            cpu: "300m"

            memory: "256Mi"


        readinessProbe:

          httpGet:

            path: /

            port: 80

          initialDelaySeconds: 10

          periodSeconds: 10



        livenessProbe:

          httpGet:

            path: /

            port: 80

          initialDelaySeconds: 30

          periodSeconds: 20