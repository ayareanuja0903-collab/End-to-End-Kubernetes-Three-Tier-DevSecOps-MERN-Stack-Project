apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: three-tier-ingress
  namespace: three-tier-app

  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'


spec:

  ingressClassName: alb

  rules:

  - http:

      paths:


      # Backend API
      - path: /api
        pathType: Prefix

        backend:
          service:
            name: backend-service
            port:
              number: 5000



      # Backend health check
      - path: /healthz
        pathType: Exact

        backend:
          service:
            name: backend-service
            port:
              number: 5000



      # Backend readiness
      - path: /ready
        pathType: Exact

        backend:
          service:
            name: backend-service
            port:
              number: 5000



      # Backend started check
      - path: /started
        pathType: Exact

        backend:
          service:
            name: backend-service
            port:
              number: 5000



      # React frontend
      - path: /
        pathType: Prefix

        backend:
          service:
            name: frontend-service
            port:
              number: 80
