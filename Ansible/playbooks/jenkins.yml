---
- name: Install and Configure Jenkins
  hosts: jenkins
  become: true

  tasks:

    - name: Install required packages
      apt:
        name:
          - openjdk-21-jre
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Create APT keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Remove old Jenkins key
      file:
        path: /etc/apt/keyrings/jenkins-keyring.gpg
        state: absent

    - name: Download Jenkins 2026 GPG key
      get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /etc/apt/keyrings/jenkins-keyring.asc
        mode: "0644"

    - name: Add Jenkins repository
      copy:
        dest: /etc/apt/sources.list.d/jenkins.list
        mode: "0644"
        content: |
          deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Create Jenkins init.groovy.d directory
      file:
        path: /var/lib/jenkins/init.groovy.d
        state: directory
        owner: jenkins
        group: jenkins
        mode: "0755"

    - name: Copy Groovy initialization script
      template:
        src: ../templates/basic-security.groovy.j2
        dest: /var/lib/jenkins/init.groovy.d/basic-security.groovy
        owner: jenkins
        group: jenkins
        mode: "0644"

    - name: Copy Jenkins plugins list
      copy:
        src: ../files/plugins.txt
        dest: /var/lib/jenkins/plugins.txt
        owner: jenkins
        group: jenkins
        mode: "0644"

    - name: Enable and start Jenkins
      systemd:
        name: jenkins
        enabled: yes
        state: restarted

    - name: Wait for Jenkins to start
      wait_for:
        port: 8080
        delay: 10
        timeout: 180

    - name: Verify Jenkins service
      command: systemctl is-active jenkins
      register: jenkins_status
      changed_when: false

    - name: Display Jenkins status
      debug:
        msg: "Jenkins status: {{ jenkins_status.stdout }}"