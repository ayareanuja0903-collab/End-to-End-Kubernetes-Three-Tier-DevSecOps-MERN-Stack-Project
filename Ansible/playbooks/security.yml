---
- name: Security Tools
  hosts: all
  become: yes

  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

  tasks:

    # -------------------------
    # Trivy Installation
    # -------------------------

    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - unzip
          - gnupg
        state: present
        update_cache: yes

    - name: Install Trivy
      shell: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
      args:
        creates: /usr/local/bin/trivy


    # -------------------------
    # SonarScanner Installation
    # -------------------------

    - name: Download SonarScanner CLI
      get_url:
        url: https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-7.3.0.5189-linux-x64.zip
        dest: /tmp/sonar-scanner.zip

    - name: Extract SonarScanner
      unarchive:
        src: /tmp/sonar-scanner.zip
        dest: /opt
        remote_src: yes
        creates: /opt/sonar-scanner-7.3.0.5189-linux-x64

    - name: Create SonarScanner symlink
      file:
        src: /opt/sonar-scanner-7.3.0.5189-linux-x64/bin/sonar-scanner
        dest: /usr/local/bin/sonar-scanner
        state: link


    # -------------------------
    # SonarQube Server
    # -------------------------

    - name: Add SonarQube Helm Repository
      command: >
        helm repo add sonarqube
        https://SonarSource.github.io/helm-chart-sonarqube
      register: sonar_repo
      changed_when: "'already exists' not in sonar_repo.stdout"

    - name: Update Helm repositories
      command: helm repo update


    - name: Create SonarQube namespace
      command: kubectl create namespace sonarqube
      register: sonar_namespace
      failed_when: false
      changed_when: "'created' in sonar_namespace.stdout"


    - name: Install SonarQube
      command: >
        helm upgrade --install sonarqube
        sonarqube/sonarqube
        --namespace sonarqube
        --create-namespace
        -f /home/ubuntu/Ansible/files/sonarqube-values.yaml


    - name: Expose SonarQube Service
      command: >
        kubectl patch svc sonarqube-sonarqube
        -n sonarqube
        -p '{"spec":{"type":"LoadBalancer"}}'


    - name: Verify SonarQube
      command: kubectl get pods -n sonarqube
      register: sonar_status
      changed_when: false


    - name: Display SonarQube Status
      debug:
        msg: "{{ sonar_status.stdout }}"